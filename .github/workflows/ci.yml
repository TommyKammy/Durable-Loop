name: CI

# Scope note: this repository is a partial export. The pipeline below runs the
# checks the export can fully support today — TypeScript build/typecheck plus the
# workstation-local-path and subprocess-safety hygiene gates. The broader
# regression suites (managed-restart launcher assets, replay corpus, etc.) depend
# on operational assets that are not part of this export and are intentionally
# omitted until those assets land.

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm run verify:paths
      - run: npm run verify:subprocess-safety
